default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>
  pool: 5
  timeout: 5000
  username: <%= ENV.fetch('DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DB_PASSWORD', 'postgres') %>
  database: <%= ENV.fetch('DB_NAME', 'vending_machine') %>

development:
  <<: *default

test:
  <<: *default
  database: <%= "#{ENV.fetch('DB_NAME', 'vending_machine')}-test" %>
